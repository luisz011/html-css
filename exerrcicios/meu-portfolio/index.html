<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box shadow</title>
    <style>
        *{
            margin: 0%;
            padding: 0%;
            box-sizing: border-box;
            list-style: none;
        }
        body{    
            background-color: rgb(30, 26, 26);
            color: white;   
        }

        nav{
            background-color: rgb(51, 4, 95);
            height: 100px;
            width: 100vw;
            color: antiquewhite;
            font-size: 30px;  
            display: flex;
            align-items: center;
            font-style: 'Times New Roman';
            font-weight: 600;
        }
 
        ul{
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            width: 100vw;
        }
        div{
            height: 100%;
            width: 100%;
        }

        img{
            height: 300px;
            width: 300px;
            object-fit: contain;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.098);                                                              ;
        }
        header{
            height: 100%;
            width: 100%;
        }

        #ft{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
        }
        
        li:hover{
            color: rgb(0, 0, 0);
        }
        </style>
    </head>
    <body>
        <header>
            <nav>
                <ul>
                    <li>Inicio</li>
                    <li>Cursos</li>
                    <li>Certificados</li>
                    <li>Conta</li>
                </ul>
            </nav>
            </header>

            <div id="ft">
            <img src="perfil/essa.jpg" alt="foto de perfil">
            </div>
   
</body>
</html>
