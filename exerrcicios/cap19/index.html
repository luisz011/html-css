<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    
    body{
        background-image: url(wallpaper001.jpg);
    }
    
    #container{
            display: flex;
            justify-content: center;
            gap: 10px;
    }

    .quadrado{
        width: 300px;
        height: 300px;
        border-radius: 10px;
        background-color: blue;
        border: 3px solid black;
    }

    #q1{
        background-color: black;
    }

    #q2{
        background-image: linear-gradient(to bottom,green,yellow,red);
    }

    #q3{
        background-image: url('pattern003.png');
    }
</style>
<body>
    <div id="container">
        <div class="quadrado" id="q1"></div>
        <div class="quadrado" id="q2"></div>
        <div class="quadrado" id="q3"></div>
    </div>
</body>
</html>
